name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  # ── Node.js / TypeScript (mcp-server) ───────────────────────────────────────
  ts-typecheck:
    name: TypeScript — type check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mcp-server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  build:
    name: Build — mcp-server
    runs-on: ubuntu-latest
    needs: ts-typecheck
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mcp-server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  test:
    name: Test — mcp-server
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mcp-server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  audit:
    name: Dependency audit — mcp-server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mcp-server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit (high+)
        run: npm audit --audit-level=high

  # ── PHP / WordPress plugin (wp-plugin) ──────────────────────────────────────
  php-lint:
    name: PHP Syntax Lint — wp-plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "7.4"

      - name: Lint PHP files (active plugin only)
        run: |
          find wp-plugin/axtolab-ai-connector -name "*.php" | xargs -r php -l

  php-boundary-proofs:
    name: PHP Boundary Proofs — Add-on gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "7.4"

      - name: Run add-on boundary proofs
        run: scripts/verify-addon-boundary-proofs.sh

  package:
    name: Package ZIP
    runs-on: ubuntu-latest
    needs:
      - build
      - test
      - php-lint
      - php-boundary-proofs
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mcp-server/package-lock.json

      - name: Install MCP server dependencies
        working-directory: mcp-server
        run: npm ci

      - name: Build and verify customer ZIP
        run: bash scripts/package-plugin.sh

  # ── Release — auto-publish artifacts when a v* tag is pushed ───────────────
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mcp-server/package-lock.json

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "7.4"

      - name: Install MCP server dependencies
        working-directory: mcp-server
        run: npm ci

      - name: Build customer ZIP + .mcpb bundle
        run: bash scripts/package-plugin.sh

      - name: Resolve artifact paths
        id: artifacts
        run: |
          zip_file=$(ls dist/axtolab-ai-connector-*.zip | head -1)
          mcpb_file=wp-plugin/axtolab-ai-connector/assets/axtolab-ai-connector.mcpb
          echo "zip_file=$zip_file" >> "$GITHUB_OUTPUT"
          echo "mcpb_file=$mcpb_file" >> "$GITHUB_OUTPUT"

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.artifacts.outputs.zip_file }}
            ${{ steps.artifacts.outputs.mcpb_file }}
          generate_release_notes: true
          fail_on_unmatched_files: true
